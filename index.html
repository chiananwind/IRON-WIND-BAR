<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Wind Bar — Lucky Spin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #c9a227;
  --gold-lt:   #f0d870;
  --gold-dk:   #7a5c0a;
  --bg:        #06080f;
  --cream:     #ede0c4;
  --cream-dim: #8a7a5a;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: "Noto Serif TC", serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 35% at 50% -5%,  rgba(201,162,39,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 90%,  rgba(184,115,51,0.07) 0%, transparent 60%);
}
.page {
  position: relative; z-index: 1;
  max-width: 680px; margin: 0 auto;
  padding: 36px 20px 60px;
  display: flex; flex-direction: column; align-items: center;
}

/* ── Logo ── */
.logo-img {
  width: min(360px, 88vw);
  margin-bottom: 4px;
  filter: drop-shadow(0 0 14px rgba(201,162,39,0.28));
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 30px; }
.bar-sub {
  font-family: "Cinzel Decorative", serif;
  font-size: 12px; letter-spacing: 0.55em;
  color: var(--gold); opacity: 0.7;
  text-transform: uppercase; margin-bottom: 10px;
}
.main-title {
  font-family: "Cinzel", serif;
  font-size: clamp(36px, 9vw, 56px);
  font-weight: 900; letter-spacing: 0.14em;
  color: var(--cream); line-height: 1;
}
.main-sub {
  font-family: "Cinzel", serif;
  font-size: clamp(12px, 3vw, 15px);
  letter-spacing: 0.55em; color: var(--gold);
  margin-top: 8px;
}
.rule-line {
  display: flex; align-items: center; gap: 10px;
  margin: 16px auto 0; width: 260px;
}
.rule-line::before, .rule-line::after {
  content: ""; flex: 1; height: 1px;
}
.rule-line::before { background: linear-gradient(90deg, transparent, var(--gold-dk)); }
.rule-line::after  { background: linear-gradient(90deg, var(--gold-dk), transparent); }
.gem { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink:0; }

/* ── Tabs ── */
.tabs {
  display: flex; width: 100%;
  border: 1px solid rgba(201,162,39,0.25);
  border-radius: 1px; overflow: hidden;
  margin-bottom: 36px;
}
.tab-btn {
  flex: 1; padding: 15px 12px;
  background: transparent; border: none; cursor: pointer;
  font-family: "Noto Serif TC", serif; font-size: 15px;
  letter-spacing: 0.08em; color: var(--cream-dim);
  transition: all 0.35s ease;
  border-right: 1px solid rgba(201,162,39,0.2);
  position: relative;
}
.tab-btn:last-child { border-right: none; }
.tab-btn::after {
  content: ""; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--gold);
  transform: scaleX(0); transition: transform 0.35s ease;
}
.tab-btn.active { background: rgba(201,162,39,0.08); color: var(--gold); }
.tab-btn.active::after { transform: scaleX(1); }
.tab-cond { display: block; font-size: 12px; opacity: 0.5; margin-top: 4px; }

/* ── Panel ── */
.panel { display: none; flex-direction: column; align-items: center; width: 100%; }
.panel.active { display: flex; }

/* ── Wheel ── */
.wheel-wrap {
  position: relative;
  width: min(360px, 90vw); height: min(360px, 90vw);
  margin: 8px auto;
}
.wheel-ring {
  position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(201,162,39,0.35);
  box-shadow: 0 0 24px rgba(201,162,39,0.18), 0 0 60px rgba(201,162,39,0.06);
}
.wheel-ring2 {
  position: absolute; inset: -18px; border-radius: 50%;
  border: 1px solid rgba(201,162,39,0.12);
}
.pointer-wrap {
  position: absolute; top: -28px; left: 50%;
  transform: translateX(-50%); z-index: 10;
  filter: drop-shadow(0 0 10px rgba(201,162,39,0.9));
}
.wheel-canvas {
  width: 100%; height: 100%; border-radius: 50%; display: block;
  box-shadow: 0 0 50px rgba(0,0,0,0.95), 0 0 100px rgba(201,162,39,0.08);
}
.hub {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle, #221800 0%, #080500 100%);
  border: 2px solid var(--gold);
  box-shadow: 0 0 20px rgba(201,162,39,0.6);
  z-index: 5; display: flex; align-items: center; justify-content: center;
}
.hub-dot {
  width: 15px; height: 15px; border-radius: 50%;
  background: radial-gradient(circle, var(--gold-lt) 0%, var(--gold) 60%, var(--gold-dk) 100%);
  box-shadow: 0 0 10px var(--gold);
}

/* ── Spin Button ── */
.spin-btn {
  margin-top: 30px; padding: 17px 52px;
  font-family: "Noto Serif TC", serif;
  font-size: 20px;
  letter-spacing: 0.2em; font-weight: 700;
  color: #0a0800;
  background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 45%, #a07818 75%, var(--gold-dk) 100%);
  border: none; cursor: pointer;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  position: relative; overflow: hidden; transition: all 0.3s ease;
}
.spin-btn::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s;
}
.spin-btn:hover:not(:disabled)::before { opacity: 1; }
.spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 35px rgba(201,162,39,0.45); }
.spin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Already Spun Banner ── */
.spun-banner {
  display: none;
  margin-top: 20px;
  padding: 14px 28px;
  border: 1px solid rgba(201,162,39,0.3);
  background: rgba(201,162,39,0.05);
  text-align: center;
  font-size: 15px;
  color: var(--cream-dim);
  letter-spacing: 0.1em;
  line-height: 1.8;
}
.spun-banner.show { display: block; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: linear-gradient(160deg, #0e0c02 0%, #1a1400 60%, #0c0a00 100%);
  border: 1px solid rgba(201,162,39,0.6);
  padding: 50px 52px;
  text-align: center; max-width: 440px; width: 90%;
  position: relative; overflow: hidden;
  box-shadow: 0 0 100px rgba(201,162,39,0.25), 0 30px 80px rgba(0,0,0,0.9);
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform: scale(0.65) translateY(30px); opacity:0; }
  to   { transform: scale(1) translateY(0);       opacity:1; }
}
.modal-box::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,39,0.13) 0%, transparent 70%);
  pointer-events: none;
}
.modal-box::after {
  content: ""; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-icon { font-size: 44px; margin-bottom: 16px; }
.modal-congrats {
  font-family: "Cinzel", serif;
  font-size: 13px; letter-spacing: 0.5em;
  color: var(--gold); margin-bottom: 18px;
}
.modal-prize {
  font-size: clamp(32px, 8vw, 48px);
  font-weight: 700; color: var(--cream);
  letter-spacing: 0.06em; line-height: 1.25;
  text-shadow: 0 0 40px rgba(201,162,39,0.5);
  margin-bottom: 20px;
}
.modal-note {
  font-size: 14px; color: var(--cream-dim);
  letter-spacing: 0.1em; margin-bottom: 32px; line-height: 2;
}
.modal-close {
  padding: 14px 48px;
  font-family: "Noto Serif TC", serif; font-size: 16px;
  letter-spacing: 0.25em; font-weight: 700;
  color: #0a0800;
  background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 50%, var(--gold-dk) 100%);
  border: none; cursor: pointer;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  transition: all 0.3s;
}
.modal-close:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,162,39,0.4); }

/* ── Password Modal ── */
.pwd-overlay {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
.pwd-overlay.open { display: flex; }
.pwd-box {
  background: #0c0a02; border: 1px solid rgba(201,162,39,0.4);
  padding: 40px 44px; text-align: center; width: 340px;
  box-shadow: 0 0 60px rgba(201,162,39,0.15);
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.pwd-title {
  font-family: "Cinzel", serif; font-size: 14px;
  letter-spacing: 0.4em; color: var(--gold); margin-bottom: 6px;
}
.pwd-subtitle {
  font-size: 12px; color: var(--cream-dim);
  letter-spacing: 0.12em; margin-bottom: 22px;
}
.pwd-input {
  width: 100%; padding: 12px 14px;
  background: rgba(201,162,39,0.06);
  border: 1px solid rgba(201,162,39,0.35);
  color: var(--cream); font-size: 22px;
  font-family: "Cinzel", serif; letter-spacing: 0.5em;
  text-align: center; outline: none;
  transition: border-color 0.3s; margin-bottom: 8px;
}
.pwd-input:focus { border-color: var(--gold); }
.pwd-error {
  font-size: 12px; color: #ff6060; letter-spacing: 0.15em;
  height: 20px; margin-bottom: 18px;
  opacity: 0; transition: opacity 0.3s;
}
.pwd-error.show { opacity: 1; }
.pwd-row { display: flex; gap: 10px; }
.pwd-cancel {
  flex: 1; padding: 11px; background: transparent;
  border: 1px solid rgba(201,162,39,0.25);
  color: var(--cream-dim); font-size: 13px;
  letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s;
}
.pwd-cancel:hover { border-color: var(--gold); color: var(--gold); }
.pwd-confirm {
  flex: 1; padding: 11px; background: var(--gold);
  border: none; color: #0a0800; font-size: 13px;
  letter-spacing: 0.2em; cursor: pointer; font-weight: 700; transition: all 0.3s;
}
.pwd-confirm:hover { background: var(--gold-lt); }

/* ── Reset link ── */
.reset-link {
  margin-top: 14px; background: transparent; border: none;
  color: rgba(138,122,90,0.3); font-size: 12px;
  letter-spacing: 0.18em; cursor: pointer;
  font-family: "Noto Serif TC", serif;
  transition: color 0.3s; text-decoration: underline;
}
.reset-link:hover { color: var(--cream-dim); }

/* ── Particles ── */
#particle-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

/* ── Footer ── */
.footer {
  margin-top: 52px; text-align: center;
  font-size: 12px; letter-spacing: 0.2em;
  color: rgba(138,122,90,0.3); line-height: 2.2;
}
@media (max-width: 420px) {
  .spin-btn { padding: 15px 32px; font-size: 18px; }
  .modal-box { padding: 36px 24px; }
  .pwd-box { width: 90%; padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<canvas id="particle-canvas"></canvas>

<!-- ── Result Modal ── -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon">🎉</div>
    <div class="modal-congrats">✦ &nbsp; 恭 喜 獲 得 &nbsp; ✦</div>
    <div class="modal-prize" id="modal-prize">—</div>
    <div class="modal-note" id="modal-note"></div>
    <button class="modal-close" id="modal-close-btn">關 閉</button>
  </div>
</div>

<!-- ── Password Modal ── -->
<div class="pwd-overlay" id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-title">工作人員驗證</div>
    <div class="pwd-subtitle">輸入密碼以重置轉盤</div>
    <input class="pwd-input" id="pwd-input" type="password"
      maxlength="6" placeholder="••••"
      onkeydown="if(event.key==='Enter')confirmPwd()">
    <div class="pwd-error" id="pwd-error">密碼錯誤，請再試一次</div>
    <div class="pwd-row">
      <button class="pwd-cancel" onclick="closePwd()">取消</button>
      <button class="pwd-confirm" onclick="confirmPwd()">確認</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
var WHEELS = [
  {
    prizes:  ["小份薯條","貢丸湯","甜不辣","唐揚雞"],
    weights: [20, 50, 20, 10],
    notes:   ["請至吧檯兌換","請至吧檯兌換","請至吧檯兌換","請至吧檯兌換"],
    segments: [
      { bg:["#120e00","#2a1e00"], text:"#f0d870" },
      { bg:["#c9a227","#a07818"], text:"#120e00" },
      { bg:["#1a1200","#301e00"], text:"#f0d870" },
      { bg:["#b8911f","#8a6a10"], text:"#120e00" }
    ]
  },
  {
    prizes:  ["下次消費\n七折","下次消費\n八折","下次消費\n九折","現場折價\n50元"],
    weights: [1, 4, 15, 80],
    notes:   ["憑此畫面向服務人員兌換","憑此畫面向服務人員兌換","憑此畫面向服務人員兌換","直接於本次帳單折抵"],
    segments: [
      { bg:["#0a0e1a","#121828"], text:"#8ecfff" },
      { bg:["#0e2444","#122e5c"], text:"#c9e8ff" },
      { bg:["#060c16","#0c1524"], text:"#8ecfff" },
      { bg:["#102040","#14284e"], text:"#c9e8ff" }
    ]
  }
];

var LS_KEYS = ["iwb_wheel0_done","iwb_wheel1_done"];
var LS_ANGLE = ["iwb_wheel0_angle","iwb_wheel1_angle"];

/* ══════════════════════════════════════════
   STATE  — loaded from localStorage
══════════════════════════════════════════ */
var state = [
  { angle: 0, spinning: false, done: false },
  { angle: 0, spinning: false, done: false }
];

function loadState() {
  for (var i = 0; i < 2; i++) {
    var done  = localStorage.getItem(LS_KEYS[i]);
    var angle = localStorage.getItem(LS_ANGLE[i]);
    if (done === "1") {
      state[i].done  = true;
      state[i].angle = parseFloat(angle) || 0;
    }
  }
}

function saveState(idx) {
  localStorage.setItem(LS_KEYS[idx],  "1");
  localStorage.setItem(LS_ANGLE[idx], String(state[idx].angle));
}

function clearState(idx) {
  localStorage.removeItem(LS_KEYS[idx]);
  localStorage.removeItem(LS_ANGLE[idx]);
}

/* ══════════════════════════════════════════
   WEIGHTED RANDOM
══════════════════════════════════════════ */
function weightedRandom(weights) {
  var total = 0;
  for (var i = 0; i < weights.length; i++) total += weights[i];
  var r = Math.random() * total;
  for (var j = 0; j < weights.length; j++) {
    r -= weights[j];
    if (r <= 0) return j;
  }
  return weights.length - 1;
}

/* ══════════════════════════════════════════
   DRAW WHEEL
══════════════════════════════════════════ */
function drawWheel(idx) {
  var canvas = document.getElementById("wheel-" + idx);
  var wrap   = document.getElementById("wrap-" + idx);
  var W = wrap.clientWidth || 360;
  canvas.width  = W;
  canvas.height = W;
  var ctx = canvas.getContext("2d");
  var cx  = W/2, cy = W/2, R = W/2 - 4;
  var data = WHEELS[idx];
  var s    = state[idx];
  var n    = data.prizes.length;
  var seg  = (2 * Math.PI) / n;
  var rot  = s.angle * Math.PI / 180;

  ctx.clearRect(0, 0, W, W);

  for (var i = 0; i < n; i++) {
    var a0 = rot + i * seg;
    var a1 = a0 + seg;
    var am = a0 + seg / 2;
    var sg = data.segments[i];

    var grd = ctx.createRadialGradient(cx, cy, R*0.05, cx, cy, R);
    grd.addColorStop(0, sg.bg[0]);
    grd.addColorStop(1, sg.bg[1]);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, a0, a1);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.strokeStyle = "rgba(201,162,39,0.55)";
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    /* Prize text */
    var lines    = data.prizes[i].split("\n");
    var textR    = R * 0.62;
    var fontSize = W < 280 ? 13 : 16;
    var lineH    = fontSize + 6;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(am);
    var flip = Math.sin(am) < 0;
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign    = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle    = sg.text;
    ctx.font         = "bold " + fontSize + "px \"Noto Serif TC\", serif";
    ctx.shadowColor  = "rgba(0,0,0,0.9)";
    ctx.shadowBlur   = 5;
    var base   = flip ? -textR : textR;
    var totalH = (lines.length - 1) * lineH;
    for (var li = 0; li < lines.length; li++) {
      ctx.fillText(lines[li], base, li * lineH - totalH / 2);
    }
    ctx.restore();
  }

  /* Outer border */
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = "#c9a227";
  ctx.lineWidth   = 3;
  ctx.stroke();

  /* Tick marks */
  var ticks = n * 6;
  for (var t = 0; t < ticks; t++) {
    var ta     = rot + (t / ticks) * Math.PI * 2;
    var isMain = (t % 6 === 0);
    var r1     = R - (isMain ? 13 : 6);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(ta) * r1, cy + Math.sin(ta) * r1);
    ctx.lineTo(cx + Math.cos(ta) * R,  cy + Math.sin(ta) * R);
    ctx.strokeStyle = isMain ? "rgba(201,162,39,0.9)" : "rgba(201,162,39,0.35)";
    ctx.lineWidth   = isMain ? 2 : 1;
    ctx.stroke();
  }

  /* Inner circle */
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.10, 0, Math.PI * 2);
  ctx.fillStyle = "#050400";
  ctx.fill();
}

/* ══════════════════════════════════════════
   SPIN
══════════════════════════════════════════ */
function triggerSpin(idx) {
  var s = state[idx];
  if (s.spinning || s.done) return;

  var data     = WHEELS[idx];
  var n        = data.prizes.length;
  var prizeIdx = weightedRandom(data.weights);
  var segDeg   = 360 / n;
  var center   = prizeIdx * segDeg + segDeg / 2;
  var target   = ((270 - center) % 360 + 360) % 360;
  var cur      = ((s.angle % 360) + 360) % 360;
  var extra    = (6 + Math.floor(Math.random() * 5)) * 360;
  var totalRot = extra + ((target - cur + 360) % 360);

  s.spinning = true;
  document.getElementById("spin-" + idx).disabled = true;

  var t0       = performance.now();
  var duration = 4400 + Math.random() * 1800;
  var startAng = s.angle;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    var p  = Math.min((now - t0) / duration, 1);
    s.angle = startAng + totalRot * ease(p);
    drawWheel(idx);
    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      s.angle    = startAng + totalRot;
      s.spinning = false;
      s.done     = true;
      drawWheel(idx);
      saveState(idx);                         /* ← persist to localStorage */
      document.getElementById("banner-" + idx).classList.add("show");
      setTimeout(function() { showModal(idx, prizeIdx); }, 350);
    }
  }

  requestAnimationFrame(frame);
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function showModal(idx, prizeIdx) {
  var data  = WHEELS[idx];
  var prize = data.prizes[prizeIdx].replace(/\n/g, " ");
  var note  = data.notes[prizeIdx];
  document.getElementById("modal-prize").textContent = prize;
  document.getElementById("modal-note").textContent  = note;
  document.getElementById("modal").classList.add("open");
  burstParticles();
}

document.getElementById("modal-close-btn").addEventListener("click", function() {
  document.getElementById("modal").classList.remove("open");
});
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("open");
});

/* ══════════════════════════════════════════
   PASSWORD
══════════════════════════════════════════ */
var pendingIdx = -1;

function openPwd(idx) {
  pendingIdx = idx;
  document.getElementById("pwd-input").value = "";
  document.getElementById("pwd-error").classList.remove("show");
  document.getElementById("pwd-overlay").classList.add("open");
  setTimeout(function() { document.getElementById("pwd-input").focus(); }, 120);
}

function closePwd() {
  document.getElementById("pwd-overlay").classList.remove("open");
  pendingIdx = -1;
}

function confirmPwd() {
  var val = document.getElementById("pwd-input").value;
  if (val === "2320") {
    closePwd();
    if (pendingIdx >= 0) doReset(pendingIdx);
  } else {
    document.getElementById("pwd-error").classList.add("show");
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

function doReset(idx) {
  clearState(idx);                            /* ← clear localStorage */
  state[idx].angle   = 0;
  state[idx].spinning = false;
  state[idx].done    = false;
  document.getElementById("spin-" + idx).disabled = false;
  document.getElementById("banner-" + idx).classList.remove("show");
  drawWheel(idx);
}

/* ══════════════════════════════════════════
   TAB SWITCH
══════════════════════════════════════════ */
function switchTab(idx) {
  document.querySelectorAll(".tab-btn").forEach(function(b, i) {
    b.classList.toggle("active", i === idx);
  });
  document.querySelectorAll(".panel").forEach(function(p, i) {
    p.classList.toggle("active", i === idx);
  });
}

/* ══════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════ */
function burstParticles() {
  var cvs = document.getElementById("particle-canvas");
  var ctx = cvs.getContext("2d");
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  var ow = cvs.width, oh = cvs.height;
  var ox = ow / 2, oy = oh / 2;
  var colors = ["#c9a227","#f0d870","#ffe090","#ffffff","#ffc060"];
  var particles = [];
  for (var k = 0; k < 110; k++) {
    particles.push({
      x: ox + (Math.random() - 0.5) * 220,
      y: oy,
      vx: (Math.random() - 0.5) * 13,
      vy: -(Math.random() * 18 + 5),
      life: 1,
      decay: 0.009 + Math.random() * 0.014,
      size: 3 + Math.random() * 7,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rect: Math.random() < 0.55
    });
  }
  function anim() {
    ctx.clearRect(0, 0, ow, oh);
    var alive = false;
    for (var pi = 0; pi < particles.length; pi++) {
      var p = particles[pi];
      if (p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += 0.4;
      p.life -= p.decay; p.rot += p.rotV;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle   = p.color;
      if (p.rect) {
        ctx.fillRect(-p.size/2, -p.size*0.25, p.size, p.size*0.5);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (alive) requestAnimationFrame(anim);
    else ctx.clearRect(0, 0, ow, oh);
  }
  requestAnimationFrame(anim);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function initAll() {
  loadState();
  for (var i = 0; i < 2; i++) {
    drawWheel(i);
    if (state[i].done) {
      document.getElementById("spin-" + i).disabled = true;
      document.getElementById("banner-" + i).classList.add("show");
    }
  }
}

window.addEventListener("resize", function() { drawWheel(0); drawWheel(1); });
document.fonts.ready.then(initAll);
</script>
