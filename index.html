<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Wind Bar — Lucky Spin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #c9a227;
  --gold-lt:   #f5df7a;
  --gold-dk:   #7a5c0a;
  --bg:        #06080f;
  --cream:     #fffbe8;
  --cream-dim: #a09060;
  --line-green:#06c755;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--cream);
  font-family: "Noto Sans TC","微軟正黑體","Microsoft JhengHei",sans-serif;
  font-weight: 700; min-height: 100vh; overflow-x: hidden;
}
.bg-glow {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 35% at 50% -5%, rgba(201,162,39,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(184,115,51,0.08) 0%, transparent 60%);
}
.page {
  position:relative; z-index:1; max-width:680px; margin:0 auto;
  padding:28px 20px 60px; display:flex; flex-direction:column; align-items:center;
}

/* ── Logo ── */
.logo-img {
  width:min(180px,44vw); margin-bottom:10px;
  filter:drop-shadow(0 0 10px rgba(201,162,39,0.22));
}

/* ── Header ── */
.header { text-align:center; margin-bottom:26px; }
.bar-name {
  font-family:"Cinzel",serif; font-size:clamp(20px,5vw,28px);
  font-weight:900; letter-spacing:0.18em; color:var(--gold);
  margin-bottom:4px;
}
.main-title {
  font-family:"Noto Sans TC",sans-serif;
  font-size:clamp(36px,9vw,54px); font-weight:900;
  letter-spacing:0.12em; color:var(--cream); line-height:1;
}
.main-sub {
  font-family:"Cinzel",serif; font-size:clamp(11px,2.8vw,14px);
  letter-spacing:0.5em; color:var(--gold); margin-top:7px; font-weight:700;
}
.rule-line {
  display:flex; align-items:center; gap:10px; margin:14px auto 0; width:240px;
}
.rule-line::before { content:""; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dk)); }
.rule-line::after  { content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--gold-dk),transparent); }
.gem { width:7px; height:7px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }

/* ── Tabs ── */
.tabs {
  display:flex; width:100%; border:1px solid rgba(201,162,39,0.28);
  border-radius:1px; overflow:hidden; margin-bottom:32px;
}
.tab-btn {
  flex:1; padding:15px 10px; background:transparent; border:none; cursor:pointer;
  font-family:"Noto Sans TC",sans-serif; font-size:15px; font-weight:900;
  letter-spacing:0.04em; color:var(--cream-dim); transition:all 0.3s;
  border-right:1px solid rgba(201,162,39,0.2); position:relative;
}
.tab-btn:last-child { border-right:none; }
.tab-btn::after {
  content:""; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--gold); transform:scaleX(0); transition:transform 0.3s;
}
.tab-btn.active { background:rgba(201,162,39,0.1); color:var(--gold); }
.tab-btn.active::after { transform:scaleX(1); }
.tab-cond { display:block; font-size:11px; font-weight:700; opacity:0.55; margin-top:4px; }

/* ── Panel ── */
.panel { display:none; flex-direction:column; align-items:center; width:100%; }
.panel.active { display:flex; }

/* ── Wheel ── */
.wheel-wrap {
  position:relative; width:min(360px,90vw); height:min(360px,90vw); margin:8px auto;
}
.wheel-ring {
  position:absolute; inset:-10px; border-radius:50%;
  border:1px solid rgba(201,162,39,0.38);
  box-shadow:0 0 26px rgba(201,162,39,0.2),0 0 60px rgba(201,162,39,0.06);
}
.wheel-ring2 { position:absolute; inset:-18px; border-radius:50%; border:1px solid rgba(201,162,39,0.12); }
.pointer-wrap {
  position:absolute; top:-28px; left:50%; transform:translateX(-50%); z-index:10;
  filter:drop-shadow(0 0 10px rgba(201,162,39,0.9));
}
.wheel-canvas { width:100%; height:100%; border-radius:50%; display:block;
  box-shadow:0 0 50px rgba(0,0,0,0.95),0 0 100px rgba(201,162,39,0.08); }
.hub {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:52px; height:52px; border-radius:50%;
  background:radial-gradient(circle,#221800 0%,#080500 100%);
  border:2px solid var(--gold); box-shadow:0 0 20px rgba(201,162,39,0.6);
  z-index:5; display:flex; align-items:center; justify-content:center;
}
.hub-dot {
  width:15px; height:15px; border-radius:50%;
  background:radial-gradient(circle,var(--gold-lt) 0%,var(--gold) 60%,var(--gold-dk) 100%);
  box-shadow:0 0 10px var(--gold);
}

/* ── Spin Button ── */
.spin-btn {
  margin-top:28px; padding:16px 50px;
  font-family:"Noto Sans TC",sans-serif; font-size:20px; font-weight:900;
  letter-spacing:0.18em; color:#0a0800;
  background:linear-gradient(135deg,var(--gold-lt) 0%,var(--gold) 45%,#a07818 75%,var(--gold-dk) 100%);
  border:none; cursor:pointer;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  position:relative; overflow:hidden; transition:all 0.3s;
}
.spin-btn::before {
  content:""; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.3) 0%,transparent 50%);
  opacity:0; transition:opacity 0.3s;
}
.spin-btn:hover:not(:disabled)::before { opacity:1; }
.spin-btn:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 10px 35px rgba(201,162,39,0.45); }
.spin-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* ── Spun Banner ── */
.spun-banner {
  display:none; margin-top:18px; padding:14px 24px;
  border:1px solid rgba(201,162,39,0.3); background:rgba(201,162,39,0.06);
  text-align:center; font-size:14px; font-weight:700;
  color:var(--cream-dim); letter-spacing:0.08em; line-height:1.9;
}
.spun-banner.show { display:block; }

/* ══════════════════════════════════
   RESULT MODAL
══════════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.9); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; padding:16px;
}
.modal-overlay.open { display:flex; }

.modal-box {
  background:linear-gradient(160deg,#0e0c02 0%,#1a1400 60%,#0c0a00 100%);
  border:1px solid rgba(201,162,39,0.65); padding:40px 44px;
  text-align:center; max-width:460px; width:100%; position:relative; overflow:hidden;
  box-shadow:0 0 100px rgba(201,162,39,0.28),0 30px 80px rgba(0,0,0,0.9);
  animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform:scale(0.65) translateY(30px); opacity:0; }
  to   { transform:scale(1)    translateY(0);    opacity:1; }
}
.modal-box::before {
  content:""; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,162,39,0.14) 0%,transparent 70%);
  pointer-events:none;
}
.modal-box::after {
  content:""; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.modal-icon { font-size:42px; margin-bottom:12px; }
.modal-congrats {
  font-family:"Cinzel",serif; font-size:12px; letter-spacing:0.5em;
  color:var(--gold); margin-bottom:14px; font-weight:700;
}
.modal-prize {
  font-family:"Noto Sans TC",sans-serif;
  font-size:clamp(26px,6.5vw,40px); font-weight:900; color:var(--cream);
  letter-spacing:0.05em; line-height:1.25;
  text-shadow:0 0 40px rgba(201,162,39,0.5); margin-bottom:16px;
}

/* LINE reward section */
.modal-line-section {
  display:none; flex-direction:column; align-items:center; gap:14px;
  margin-bottom:22px;
}
.modal-line-section.show { display:flex; }

.line-desc {
  font-size:14px; font-weight:700; color:var(--cream-dim);
  letter-spacing:0.1em; line-height:1.8;
}
.line-qr {
  width:140px; height:140px; border-radius:8px;
  border:3px solid var(--line-green);
  box-shadow:0 0 20px rgba(6,199,85,0.35);
}
.line-btn {
  display:flex; align-items:center; gap:8px;
  padding:12px 28px; border-radius:28px;
  background:var(--line-green); color:#fff;
  font-family:"Noto Sans TC",sans-serif; font-size:15px; font-weight:900;
  letter-spacing:0.1em; text-decoration:none;
  box-shadow:0 4px 20px rgba(6,199,85,0.45); transition:all 0.3s;
}
.line-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(6,199,85,0.55); }
.line-icon { width:24px; height:24px; }

/* Normal note (for food / 安慰獎) */
.modal-note {
  font-size:14px; font-weight:700; color:var(--cream-dim);
  letter-spacing:0.1em; margin-bottom:26px; line-height:2;
  white-space:pre-line;
}

.modal-close {
  padding:13px 44px; font-family:"Noto Sans TC",sans-serif;
  font-size:16px; font-weight:900; letter-spacing:0.22em; color:#0a0800;
  background:linear-gradient(135deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);
  border:none; cursor:pointer;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all 0.3s;
}
.modal-close:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(201,162,39,0.4); }

/* ── Password Modal ── */
.pwd-overlay {
  display:none; position:fixed; inset:0; z-index:600;
  background:rgba(0,0,0,0.93); backdrop-filter:blur(10px);
  align-items:center; justify-content:center;
}
.pwd-overlay.open { display:flex; }
.pwd-box {
  background:#0c0a02; border:1px solid rgba(201,162,39,0.42);
  padding:38px 42px; text-align:center; width:320px;
  box-shadow:0 0 60px rgba(201,162,39,0.15);
  animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.pwd-title { font-size:15px; font-weight:900; letter-spacing:0.3em; color:var(--gold); margin-bottom:5px; }
.pwd-subtitle { font-size:12px; font-weight:700; color:var(--cream-dim); letter-spacing:0.1em; margin-bottom:20px; }
.pwd-input {
  width:100%; padding:12px 14px; background:rgba(201,162,39,0.07);
  border:1px solid rgba(201,162,39,0.38); color:var(--cream);
  font-size:24px; font-family:"Cinzel",serif; letter-spacing:0.5em;
  text-align:center; outline:none; transition:border-color 0.3s; margin-bottom:8px;
}
.pwd-input:focus { border-color:var(--gold); }
.pwd-error { font-size:12px; font-weight:700; color:#ff6060; letter-spacing:0.15em; height:20px; margin-bottom:16px; opacity:0; transition:opacity 0.3s; }
.pwd-error.show { opacity:1; }
.pwd-row { display:flex; gap:10px; }
.pwd-cancel {
  flex:1; padding:11px; background:transparent; border:1px solid rgba(201,162,39,0.28);
  color:var(--cream-dim); font-size:13px; font-weight:700; letter-spacing:0.2em; cursor:pointer; transition:all 0.3s;
}
.pwd-cancel:hover { border-color:var(--gold); color:var(--gold); }
.pwd-confirm {
  flex:1; padding:11px; background:var(--gold); border:none; color:#0a0800;
  font-size:13px; font-weight:900; letter-spacing:0.2em; cursor:pointer; transition:all 0.3s;
}
.pwd-confirm:hover { background:var(--gold-lt); }

.reset-link {
  margin-top:14px; background:transparent; border:none;
  color:rgba(138,122,90,0.28); font-size:11px; font-weight:700;
  letter-spacing:0.18em; cursor:pointer; transition:color 0.3s; text-decoration:underline;
}
.reset-link:hover { color:var(--cream-dim); }

#particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:200; }
.footer { margin-top:50px; text-align:center; font-size:12px; font-weight:700; letter-spacing:0.18em; color:rgba(138,122,90,0.3); line-height:2.2; }

@media (max-width:420px) {
  .spin-btn { padding:14px 30px; font-size:18px; }
  .modal-box { padding:32px 20px; }
  .pwd-box { width:88%; padding:32px 22px; }
  .line-qr { width:120px; height:120px; }
}
</style>
</head>

<canvas id="particle-canvas"></canvas>

function loadState() {
  for(var i=0;i<2;i++){
    if(localStorage.getItem(LS_KEYS[i])==="1"){
      state[i].done=true;
      state[i].angle=parseFloat(localStorage.getItem(LS_ANGLE[i]))||0;
    }
  }
}
function saveState(idx){
  localStorage.setItem(LS_KEYS[idx],"1");
  localStorage.setItem(LS_ANGLE[idx],String(state[idx].angle));
}
function clearState(idx){
  localStorage.removeItem(LS_KEYS[idx]);
  localStorage.removeItem(LS_ANGLE[idx]);
}

function weightedRandom(weights){
  var t=0; for(var i=0;i<weights.length;i++) t+=weights[i];
  var r=Math.random()*t;
  for(var j=0;j<weights.length;j++){r-=weights[j];if(r<=0)return j;}
  return weights.length-1;
}

  var W=wrap.clientWidth||360;
  canvas.width=canvas.height=W;
  var ctx=canvas.getContext("2d");
  var cx=W/2,cy=W/2,R=W/2-4;
  var data=WHEELS[idx],s=state[idx];
  var n=data.prizes.length,seg=(2*Math.PI)/n,rot=s.angle*Math.PI/180;
  ctx.clearRect(0,0,W,W);

  for(var i=0;i<n;i++){
    var a0=rot+i*seg,a1=a0+seg,am=a0+seg/2;
    var sg=data.segments[i];
    var grd=ctx.createRadialGradient(cx,cy,R*0.05,cx,cy,R);
    grd.addColorStop(0,sg.bg[0]); grd.addColorStop(1,sg.bg[1]);

    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R,a0,a1); ctx.closePath();
    ctx.fillStyle=grd; ctx.fill();
    ctx.strokeStyle="rgba(201,162,39,0.6)"; ctx.lineWidth=2; ctx.stroke();

    var lines=data.prizes[i].split("\n");
    var textR=R*(n>4?0.57:0.61);
    var fontSize=W<280?11:(n>4?13:15);
    var lineH=fontSize+6;
    var flip=Math.sin(am)<0;

    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(am);
    if(flip) ctx.rotate(Math.PI);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle=sg.text;
    ctx.font="900 "+fontSize+"px \"Noto Sans TC\",\"微軟正黑體\",sans-serif";
    ctx.shadowColor=sg.shadow?"rgba(0,0,0,0.95)":"transparent";
    ctx.shadowBlur=sg.shadow?6:0;

    var base=flip?-textR:textR;
    var totalH=(lines.length-1)*lineH;
    for(var li=0;li<lines.length;li++){
      ctx.fillText(lines[li],base,li*lineH-totalH/2);
    }
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle="#c9a227"; ctx.lineWidth=3; ctx.stroke();

  var ticks=n*6;
  for(var t=0;t<ticks;t++){
    var ta=rot+(t/ticks)*Math.PI*2,isM=t%6===0,r1=R-(isM?13:6);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ta)*r1,cy+Math.sin(ta)*r1);
    ctx.lineTo(cx+Math.cos(ta)*R, cy+Math.sin(ta)*R);
    ctx.strokeStyle=isM?"rgba(201,162,39,0.9)":"rgba(201,162,39,0.35)";
    ctx.lineWidth=isM?2:1; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,R*0.10,0,Math.PI*2);
  ctx.fillStyle="#050400"; ctx.fill();
}

/* ══ SPIN ══ */
function triggerSpin(idx){
  var s=state[idx];
  if(s.spinning||s.done) return;
  var data=WHEELS[idx],n=data.prizes.length;
  var prizeIdx=weightedRandom(data.weights);
  var segDeg=360/n,center=prizeIdx*segDeg+segDeg/2;
  var target=((270-center)%360+360)%360;
  var cur=((s.angle%360)+360)%360;
  var extra=(6+Math.floor(Math.random()*5))*360;
  var totalRot=extra+((target-cur+360)%360);
  s.spinning=true;
  document.getElementById("spin-"+idx).disabled=true;
  var t0=performance.now(),dur=4400+Math.random()*1800,startAng=s.angle;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    var p=Math.min((now-t0)/dur,1);
    s.angle=startAng+totalRot*ease(p); drawWheel(idx);
    if(p<1){requestAnimationFrame(frame);}
    else{
      s.angle=startAng+totalRot; s.spinning=false; s.done=true;
      drawWheel(idx); saveState(idx);
      document.getElementById("banner-"+idx).classList.add("show");
      setTimeout(function(){showModal(idx,prizeIdx);},350);
    }
  }
  requestAnimationFrame(frame);
}

/* ══ MODAL ══ */
function showModal(idx,prizeIdx){
  var data=WHEELS[idx];
  var prize=data.prizes[prizeIdx].replace(/\n/g," ");
  var isLine=data.isLine[prizeIdx];
  var icon=data.icons[prizeIdx];

  document.getElementById("modal-icon").textContent=icon||"🎉";
  document.getElementById("modal-prize").textContent=prize;

  var lineSection=document.getElementById("modal-line-section");
  var noteEl=document.getElementById("modal-note");

  if(isLine){
    lineSection.classList.add("show");
    noteEl.textContent="";
    noteEl.style.marginBottom="0";
  } else {
    lineSection.classList.remove("show");
    noteEl.textContent=data.notes[prizeIdx];
    noteEl.style.marginBottom="";
  }

  document.getElementById("modal").classList.add("open");
  burstParticles();
}

document.getElementById("modal-close-btn").addEventListener("click",function(){
  document.getElementById("modal").classList.remove("open");
});
document.getElementById("modal").addEventListener("click",function(e){
  if(e.target===this) this.classList.remove("open");
});

/* ══ PASSWORD ══ */
var pendingIdx=-1;
function openPwd(idx){
  pendingIdx=idx;
  document.getElementById("pwd-input").value="";
  document.getElementById("pwd-error").classList.remove("show");
  document.getElementById("pwd-overlay").classList.add("open");
  setTimeout(function(){document.getElementById("pwd-input").focus();},120);
}
function closePwd(){
  document.getElementById("pwd-overlay").classList.remove("open");
  pendingIdx=-1;
}
function confirmPwd(){
  var val=document.getElementById("pwd-input").value;
  if(val==="2320"){
    var idx=pendingIdx; closePwd(); if(idx>=0) doReset(idx);
  } else {
    document.getElementById("pwd-error").classList.add("show");
    document.getElementById("pwd-input").value="";
    document.getElementById("pwd-input").focus();
  }
}
function doReset(idx){
  clearState(idx);
  state[idx].angle=0; state[idx].spinning=false; state[idx].done=false;
  document.getElementById("spin-"+idx).disabled=false;
  document.getElementById("banner-"+idx).classList.remove("show");
  drawWheel(idx);
}

/* ══ TAB ══ */
function switchTab(idx){
  document.querySelectorAll(".tab-btn").forEach(function(b,i){b.classList.toggle("active",i===idx);});
  document.querySelectorAll(".panel").forEach(function(p,i){p.classList.toggle("active",i===idx);});
}

/* ══ PARTICLES ══ */
function burstParticles(){
  var cvs=document.getElementById("particle-canvas"),ctx=cvs.getContext("2d");
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  var ow=cvs.width,oh=cvs.height,ox=ow/2,oy=oh/2;
  var colors=["#c9a227","#f5df7a","#ffe090","#ffffff","#ffc060"];
  var pp=[];
  for(var k=0;k<110;k++) pp.push({
    x:ox+(Math.random()-0.5)*220,y:oy,
    vx:(Math.random()-0.5)*13,vy:-(Math.random()*18+5),
    life:1,decay:0.009+Math.random()*0.014,
    size:3+Math.random()*7,rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*0.3,
    color:colors[Math.floor(Math.random()*colors.length)],
    rect:Math.random()<0.55
  });
  function anim(){
    ctx.clearRect(0,0,ow,oh); var alive=false;
    pp.forEach(function(p){
      if(p.life<=0)return; alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.4;p.life-=p.decay;p.rot+=p.rotV;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      if(p.rect){ctx.fillRect(-p.size/2,-p.size*0.25,p.size,p.size*0.5);}
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    if(alive) requestAnimationFrame(anim); else ctx.clearRect(0,0,ow,oh);
  }
  requestAnimationFrame(anim);
}

/* ══ INIT ══ */
function initAll(){
  loadState();
  for(var i=0;i<2;i++){
    drawWheel(i);
    if(state[i].done){
      document.getElementById("spin-"+i).disabled=true;
      document.getElementById("banner-"+i).classList.add("show");
    }
  }
}
window.addEventListener("resize",function(){drawWheel(0);drawWheel(1);});
document.fonts.ready.then(initAll);
</script>
